<html>

<head>
    <title>BillMaster-Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>


<body style="background: url('main\ hero\ image.png');">

    <div class="container-fluid ">

        <div class="row d-flex justify-content-center mt-5 ">
            <div class="col-6 rounded p-4 bg-white border">
                <h1 class="text-center text-primary mb-5">Login</h1>
                <form>

                    <div>
                        <label for="email" class="form-label ">Email:</label>
                        <input class="form-control" type="text" id="email" >
                        <p id="emailError"></p>
                    </div>


                    <div>
                        <label for="password" class="form-label">Password:</label>
                        <input class="form-control" type="password" id="password" >
                        <p id="passwordError"></p>
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <input class="form-check-input" type="checkbox">
                            <label class="form-label" for="">Remember me</label>
                        </div>
                        <a href="SignUp form.html" class="text-primary fw-medium text-decoration-none">Forgot Password?</a>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <div class="g-3">
                            <a href="Dashboard.html" class="btn btn-primary px-5 py-2">Login</a>
                            <button class="btn btn-secondary px-5 py-2">Clear</button>
                        </div>
                        <a href="SignUp form.html" class="text-muted text-decoration-none">Go to Sign Up</a>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script>


        document.getElementById("email").addEventListener("keyup", function () {
            let email = this.value;

            if (email == "") {
                document.getElementById("emailError").innerHTML = "Email required";
                document.getElementById("emailError").style.color = "red"
                return;
            }

            if (email.includes("@")) {
                document.getElementById("emailError").innerHTML = "";
            } else {
                document.getElementById("emailError").innerHTML = "Invalid Email";
                document.getElementById("emailError").style.color = "red";
            }
        });


        document.getElementById("password").addEventListener("keyup", function () {
            let password = this.value;

            if (password == "") {
                document.getElementById("passwordError").innerHTML = "Password required";
                document.getElementById("passwordError").style.color = "red";
                return;
            }

            if (password.length >= 8) {
                document.getElementById("passwordError").innerHTML = "";
            } else {
                document.getElementById("passwordError").innerHTML = "Password Minimum 8 Characters";
                document.getElementById("passwordError").style.color = "red";
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
